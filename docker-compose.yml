services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      POSTGRES_EXTRA_DATABASES: games,wallets
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # RabbitMQ (with management UI)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak (Identity Provider)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./docker/keycloak/themes/crash-game:/opt/keycloak/themes/crash-game:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kong (API Gateway — DB-less / declarative)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9.1
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./docker/kong:/kong:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Games Service
  # ---------------------------------------------------------------------------
  games:
    build:
      context: .
      dockerfile: services/games/Dockerfile
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://admin:admin@postgres:5432/games
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      KEYCLOAK_ISSUER: http://localhost:8080/realms/crash-game
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/crash-game/protocol/openid-connect/certs
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Wallets Service
  # ---------------------------------------------------------------------------
  wallets:
    build:
      context: .
      dockerfile: services/wallets/Dockerfile
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      DATABASE_URL: postgresql://admin:admin@postgres:5432/wallets
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      KEYCLOAK_ISSUER: http://localhost:8080/realms/crash-game
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/crash-game/protocol/openid-connect/certs
      KEYCLOAK_INTERNAL_ISSUER: http://keycloak:8080/realms/crash-game
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Wallet seed for the test user (runs once, exits)
  # ---------------------------------------------------------------------------
  wallets-seed:
    build:
      context: .
      dockerfile: services/wallets/Dockerfile
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/wallets
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      KEYCLOAK_INTERNAL_ISSUER: http://keycloak:8080/realms/crash-game
    command: ["bun", "run", "src/scripts/seed-test-user.ts"]
    restart: "no"
    depends_on:
      wallets:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: crash-game
      VITE_KEYCLOAK_CLIENT_ID: crash-game-client
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - kong

volumes:
  postgres_data:
  rabbitmq_data:
